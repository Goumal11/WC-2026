name: ⚽ Live Score Update & Deploy

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 📦 Install Python dependencies
        run: pip install requests numpy

      - name: ⚽ Fetch scores & simulate
        env:
          FD_API_KEY: ${{ secrets.FD_API_KEY }}
        run: python simulator.py --watch --once --n 50000 --output public/bracket.json

      - name: 🔍 Check for changes
        id: check
        run: |
          git diff --quiet public/bracket.json live_scores.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 💾 Commit & push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/bracket.json live_scores.json
          git commit -m "⚽ bracket update — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: 🟢 Setup Node.js
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 📦 Install Node dependencies
        if: steps.check.outputs.changed == 'true'
        run: npm ci

      - name: 🔨 Build React app
        if: steps.check.outputs.changed == 'true'
        run: npm run build

      - name: 📤 Upload Pages artifact
        if: steps.check.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: 🌐 Deploy to GitHub Pages
        if: steps.check.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4